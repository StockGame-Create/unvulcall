<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnvulCall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.2/firebase-database-compat.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0F14;--surface:#151820;--surface2:#1C2030;--surface3:#232840;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#00E5FF;--accent-dim:rgba(0,229,255,0.12);--accent-mid:rgba(0,229,255,0.25);
  --text:#F0F2F8;--text2:rgba(240,242,248,0.55);--text3:rgba(240,242,248,0.3);
  --danger:#FF4D6A;--danger-dim:rgba(255,77,106,0.15);
  --green:#00E676;--green-dim:rgba(0,230,118,0.12);
  --r:12px;--r2:20px;
  --font-d:'Space Grotesk',sans-serif;--font-b:'Inter',sans-serif;
  --chat-w:320px;
  --ctrl-h:80px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);flex-shrink:0;z-index:20}
.logo{font-family:var(--font-d);font-size:17px;font-weight:600;letter-spacing:-.3px}
.logo span{color:var(--accent)}
.status-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 13px;font-size:12px;color:var(--text2);transition:all .3s}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .3s}
.status-pill.connected{border-color:rgba(0,230,118,.3);color:var(--green)}
.status-pill.connected .status-dot{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-pill.connecting{border-color:rgba(0,229,255,.3);color:var(--accent)}
.status-pill.connecting .status-dot{background:var(--accent);animation:pdot 1s infinite}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.25}}

/* ── SETUP ── */
#setup-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:36px;width:100%;max-width:440px}
.setup-card h1{font-family:var(--font-d);font-size:24px;font-weight:600;letter-spacing:-.4px;margin-bottom:6px}
.setup-card>p{color:var(--text2);font-size:13px;line-height:1.6;margin-bottom:28px}
.tab-row{display:flex;gap:3px;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:20px}
.tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-family:var(--font-b);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.tab.active{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.tab-panel{display:none}.tab-panel.active{display:block}
.input-group{margin-bottom:14px}
.input-group label{display:block;font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.input-group input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;color:var(--text);font-family:var(--font-b);font-size:14px;outline:none;transition:border-color .2s}
.input-group input:focus{border-color:rgba(0,229,255,.35)}
.input-group input::placeholder{color:var(--text3)}
.btn{width:100%;padding:13px;border:none;border-radius:var(--r);font-family:var(--font-b);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-primary{background:var(--accent);color:#0D0F14}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.room-id-display{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.room-id-text{font-family:var(--font-d);font-size:20px;font-weight:600;color:var(--accent);letter-spacing:3px}
.copy-btn{background:var(--accent-dim);border:1px solid rgba(0,229,255,.2);color:var(--accent);border-radius:8px;padding:5px 11px;font-size:11px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px}
.copy-btn:hover{background:var(--accent-mid)}
#waiting-msg{text-align:center;padding:14px;font-size:13px;color:var(--text2);display:none}

/* ── CALL LAYOUT ── */
#call-screen{display:none;flex:1;position:relative;overflow:hidden}
.call-layout{display:flex;width:100%;height:100%;transition:none}

/* 영상 영역 */
.video-area{position:relative;flex:1;min-width:0;transition:flex .35s cubic-bezier(.4,0,.2,1)}
#remote-video{width:100%;height:100%;object-fit:cover;background:#080a0f;display:block}
.remote-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--surface)}
.avatar-ring{width:88px;height:88px;border-radius:50%;background:var(--surface2);border:2px solid rgba(0,229,255,.25);display:flex;align-items:center;justify-content:center;animation:rpulse 2.5s ease-in-out infinite}
.avatar-ring svg{color:var(--text3)}
@keyframes rpulse{0%,100%{border-color:rgba(0,229,255,.1);box-shadow:0 0 0 0 rgba(0,229,255,0)}50%{border-color:rgba(0,229,255,.5);box-shadow:0 0 0 10px rgba(0,229,255,.04)}}
.remote-placeholder p{color:var(--text2);font-size:13px}

/* PIP */
#pip{position:absolute;bottom:calc(var(--ctrl-h) + 12px);right:14px;width:150px;height:100px;border-radius:12px;overflow:hidden;border:2px solid rgba(0,229,255,.35);cursor:grab;z-index:30;transition:border-color .3s}
#pip video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:block}
.pip-label{position:absolute;bottom:5px;left:7px;font-size:10px;color:rgba(255,255,255,.65);background:rgba(0,0,0,.45);padding:2px 6px;border-radius:5px;pointer-events:none}

/* 방 코드 배너 */
#room-banner{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:30;display:none;align-items:center;gap:9px;background:rgba(13,15,20,.88);border:1px solid rgba(0,229,255,.28);border-radius:999px;padding:7px 16px;backdrop-filter:blur(10px)}
#room-banner span{font-size:11px;color:var(--text2)}
#room-banner strong{font-family:var(--font-d);font-size:17px;font-weight:600;color:var(--accent);letter-spacing:3px}
#room-banner button{background:var(--accent-dim);border:1px solid rgba(0,229,255,.2);color:var(--accent);border-radius:7px;padding:3px 9px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:3px}
#room-banner button:hover{background:var(--accent-mid)}

/* 반응 오버레이 */
#reaction-overlay{position:absolute;inset:0;pointer-events:none;z-index:40;overflow:hidden}
.reaction-bubble{position:absolute;bottom:100px;font-size:36px;animation:rbubble 2.8s ease-out forwards;pointer-events:none}
@keyframes rbubble{0%{opacity:1;transform:translateY(0) scale(1)}70%{opacity:.9;transform:translateY(-180px) scale(1.15)}100%{opacity:0;transform:translateY(-260px) scale(.8)}}
.reaction-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:72px;animation:rlabel 1.8s ease-out forwards;pointer-events:none}
@keyframes rlabel{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.9)}}

/* ── CHAT PANEL ── */
.chat-panel{width:0;overflow:hidden;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .35s cubic-bezier(.4,0,.2,1)}
.chat-panel.open{width:var(--chat-w)}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.chat-header h3{font-family:var(--font-d);font-size:14px;font-weight:600;white-space:nowrap}
.chat-close{background:none;border:none;color:var(--text2);cursor:pointer;padding:2px;display:flex;align-items:center;border-radius:6px;transition:color .2s}
.chat-close:hover{color:var(--text)}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.msg{display:flex;flex-direction:column;gap:3px;max-width:85%}
.msg.me{align-self:flex-end;align-items:flex-end}
.msg.them{align-self:flex-start;align-items:flex-start}
.msg-who{font-size:10px;color:var(--text3);padding:0 4px}
.msg-bubble{padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.msg.me .msg-bubble{background:var(--accent);color:#0D0F14;border-bottom-right-radius:3px}
.msg.them .msg-bubble{background:var(--surface3);color:var(--text);border-bottom-left-radius:3px}
.msg-time{font-size:10px;color:var(--text3);padding:0 4px}
.chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);flex-shrink:0}
.chat-input-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:var(--font-b);font-size:13px;outline:none;transition:border-color .2s;min-width:0}
.chat-input-row input:focus{border-color:rgba(0,229,255,.35)}
.chat-input-row input::placeholder{color:var(--text3)}
.send-btn{background:var(--accent);border:none;border-radius:var(--r);padding:9px 12px;color:#0D0F14;cursor:pointer;display:flex;align-items:center;flex-shrink:0;transition:filter .2s}
.send-btn:hover{filter:brightness(1.1)}
.chat-empty{text-align:center;color:var(--text3);font-size:12px;margin:auto;padding:20px}

/* ── CONTROLS ── */
.call-controls{position:absolute;bottom:0;left:0;right:0;height:var(--ctrl-h);display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(to top,rgba(13,15,20,.96) 0%,transparent 100%);z-index:20;padding:0 16px}
.ctrl-btn{width:46px;height:46px;border-radius:50%;border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--surface2);color:var(--text);flex-shrink:0}
.ctrl-btn:hover{background:var(--surface3);border-color:rgba(255,255,255,.2)}
.ctrl-btn.off{background:var(--danger-dim);border-color:rgba(255,77,106,.35);color:var(--danger)}
.ctrl-btn.active-blue{background:var(--accent-dim);border-color:rgba(0,229,255,.35);color:var(--accent)}
.ctrl-btn.end{width:52px;height:52px;background:var(--danger);border-color:var(--danger);color:#fff;box-shadow:0 4px 16px rgba(255,77,106,.35)}
.ctrl-btn.end:hover{filter:brightness(1.1);transform:scale(1.04)}
.ctrl-sep{width:1px;height:24px;background:var(--border2);flex-shrink:0;margin:0 4px}

/* 반응 피커 */
.reaction-picker{position:absolute;bottom:calc(var(--ctrl-h) + 8px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);border-radius:999px;padding:8px 14px;display:none;gap:6px;z-index:50;white-space:nowrap}
.reaction-picker.open{display:flex}
.r-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px 6px;border-radius:8px;transition:transform .15s;line-height:1}
.r-btn:hover{transform:scale(1.3)}

/* 채팅 미읽 뱃지 */
.badge{position:absolute;top:-3px;right:-3px;background:var(--danger);color:#fff;font-size:9px;font-weight:600;border-radius:999px;padding:1px 5px;min-width:16px;text-align:center;display:none}
.badge.show{display:block}

/* ── TOAST ── */
.toast-wrap{position:fixed;top:72px;right:16px;z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 16px;font-size:12px;color:var(--text);animation:tin .25s ease,tout .25s ease 2.5s forwards;pointer-events:auto;max-width:260px}
.toast.success{border-color:rgba(0,230,118,.3);color:var(--green)}
.toast.error{border-color:rgba(255,77,106,.3);color:var(--danger)}
@keyframes tin{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tout{to{opacity:0;pointer-events:none}}

/* ── UNREAD ── */
svg{display:inline-block}
</style>
</head>

/* ═══════════════════ LUCIDE ICONS ═══════════════════ */
function ico(id, name, attrs){
  const el = document.getElementById(id);
  if(!el) return;
  lucide.createElement(name, {width: attrs?.w||16, height: attrs?.h||16, 'stroke-width':1.8})
    .then ? null : void 0;
  const svg = lucide.createIcons ? null : null;
  // 직접 render
  el.setAttribute('data-lucide', name);
}

function renderIcons(){
  if(typeof lucide === 'undefined'){ setTimeout(renderIcons, 50); return; }
  const map = {
    'ico-video':'video', 'ico-join':'radio', 'ico-copy-setup':'copy', 'ico-copy-b':'copy',
    'ico-user':'user', 'ico-mic':'mic', 'ico-cam':'video', 'ico-react':'smile',
    'ico-chat':'message-circle', 'ico-end':'phone-off', 'ico-x':'x', 'ico-send':'send'
  };
  Object.entries(map).forEach(([id, name]) => {
    const el = document.getElementById(id);
    if(el){ el.setAttribute('data-lucide', name); }
  });
  lucide.createIcons();
}

function toast(msg, type=''){
  const w = document.getElementById('toasts');

  d.textContent = msg;

function genId(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');
}
function fmtTime(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

/* ═══════════════════ MEDIA ═══════════════════ */
async function getMedia(){
  if(localStream) return true;
  try{
    localStream = await navigator.mediaDevices.getUserMedia({
      video:{width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30}},
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
    });
    document.getElementById('local-video').srcObject = localStream;
    return true;
  }catch(e){
    console.warn('cam+mic fail:',e.name);
  }
  try{
    localStream = await navigator.mediaDevices.getUserMedia({video:false,audio:{echoCancellation:true,noiseSuppression:true}});
    document.getElementById('pip').style.display = 'none';
    toast('카메라 점유 중 — 오디오만 연결','');
    return true;
  }catch(e){
    toast(`미디어 오류: ${e.name}`,'error');
    return false;
  }
}

/* ═══════════════════ WEBRTC ═══════════════════ */
function buildPC(){
  pc = new RTCPeerConnection(ICE_CFG);

  // 대역폭 최적화
  pc.onsignalingstatechange = () => {
    if(pc.signalingState === 'stable') applyBandwidth();
  };

  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  // DataChannel (채팅 + 반응) — host가 생성
  if(isHost){
    dataChannel = pc.createDataChannel('peercall', {ordered:true});
    setupDC(dataChannel);
  } else {
    pc.ondatachannel = e => { dataChannel = e.channel; setupDC(dataChannel); };
  }

  pc.ontrack = e => {
    document.getElementById('remote-video').srcObject = e.streams[0];
    document.getElementById('remote-ph').style.display = 'none';
    document.getElementById('room-banner').style.display = 'none';
    setStatus('connected','연결됨');
    toast('상대방이 연결되었습니다!','success');
  };

  pc.onicecandidate = e => {
    if(!e.candidate) return;
    const path = isHost ? 'hostCandidates' : 'guestCandidates';
    roomRef.child(path).push(e.candidate.toJSON());
  };

  pc.onconnectionstatechange = () => {
    const s = pc.connectionState;
    if(s==='disconnected'||s==='failed'){
      toast('연결이 끊어졌습니다.','error');
      setStatus('','대기 중');
      document.getElementById('remote-ph').style.display = 'flex';
    }
    if(s==='connected') applyBandwidth();
  };
}

async function applyBandwidth(){
  if(!pc) return;
  try{
    const sender = pc.getSenders().find(s=>s.track?.kind==='video');
    if(!sender) return;
    const params = sender.getParameters();
    if(!params.encodings) params.encodings=[{}];
    params.encodings[0].maxBitrate = 2_000_000; // 2Mbps
    params.encodings[0].networkPriority = 'high';
    await sender.setParameters(params);
  }catch(e){ /* 일부 브라우저 미지원 — 무시 */ }
}

/* ═══════════════════ DATA CHANNEL ═══════════════════ */
function setupDC(dc){
  dc.onopen = () => console.log('DataChannel open');
  dc.onmessage = e => {
    try{
      const msg = JSON.parse(e.data);
      if(msg.type === 'chat') addMsg(msg.text, 'them', msg.time);
      if(msg.type === 'reaction') showReaction(msg.emoji, false);
    }catch(err){}
  };
  dc.onerror = e => console.warn('DC error', e);
}

function sendDC(obj){
  if(dataChannel && dataChannel.readyState==='open'){
    dataChannel.send(JSON.stringify(obj));
    return true;
  }
  return false;
}

/* ═══════════════════ CREATE ROOM ═══════════════════ */
async function createRoom(){
  const ok = await getMedia(); if(!ok) return;
  isHost = true;
  roomId = genId();
  roomRef = db.ref('rooms/'+roomId);

  document.getElementById('room-id-display').textContent = roomId;
  document.getElementById('room-id-section').style.display = 'block';
  document.getElementById('btn-create').style.display = 'none';
  document.getElementById('waiting-msg').style.display = 'block';

  buildPC();

  const offer = await pc.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:true});
  await pc.setLocalDescription(offer);
  await roomRef.set({offer:{sdp:offer.sdp,type:offer.type}, createdAt: firebase.database.ServerValue.TIMESTAMP});

  await roomRef.onDisconnect().remove();

  roomRef.child('answer').on('value', async snap => {
    if(snap.val() && !pc.currentRemoteDescription){
      await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
    }
  });
  roomRef.child('guestCandidates').on('child_added', async snap => {
    try{ await pc.addIceCandidate(new RTCIceCandidate(snap.val())); }catch(e){}
  });

  showCall();
  document.getElementById('banner-code').textContent = roomId;
  document.getElementById('room-banner').style.display = 'flex';
  setStatus('connecting','대기 중…');
}

/* ═══════════════════ JOIN ROOM ═══════════════════ */
async function joinRoom(){
  const id = document.getElementById('join-input').value.trim().toUpperCase();
  if(id.length!==6){ toast('6자리 코드를 입력하세요.','error'); return; }
  const ok = await getMedia(); if(!ok) return;

  isHost = false;
  roomId = id;
  roomRef = db.ref('rooms/'+roomId);

  const snap = await roomRef.once('value');
  if(!snap.val()?.offer){ toast('방을 찾을 수 없습니다.','error'); return; }

  buildPC();
  showCall();

  // 리스너 먼저 등록 (candidate 누락 방지)
  roomRef.child('hostCandidates').on('child_added', async snap => {
    try{ await pc.addIceCandidate(new RTCIceCandidate(snap.val())); }catch(e){}
  });

  // SDP 교환
  await pc.setRemoteDescription(new RTCSessionDescription(snap.val().offer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await roomRef.child('answer').set({sdp:answer.sdp, type:answer.type});

  // 연결 끊기면 방 자동 삭제
  await roomRef.onDisconnect().remove();

  setStatus('connecting','연결 중…');
}



/* ═══════════════════ END CALL ═══════════════════ */
function endCall(){
  if(pc){ pc.close(); pc=null; }
  if(dataChannel){ dataChannel.close(); dataChannel=null; }
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
if(roomRef){ roomRef.remove(); roomRef=null; }

  document.getElementById('call-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('remote-video').srcObject = null;
  document.getElementById('remote-ph').style.display = 'flex';
  document.getElementById('room-banner').style.display = 'none';
  document.getElementById('btn-create').style.display = 'flex';
  document.getElementById('room-id-section').style.display = 'none';
  document.getElementById('waiting-msg').style.display = 'none';
  document.getElementById('pip').style.display = 'block';
  document.getElementById('chat-msgs').innerHTML = '<div class="chat-empty">메시지가 없습니다</div>';
  closeChatPanel();
  setStatus('','대기 중');
  unread=0; updateBadge();
  updateMicBtn(); updateCamBtn();
  toast('통화가 종료되었습니다.');
}

/* ═══════════════════ CONTROLS ═══════════════════ */
function toggleMic(){
  micOn=!micOn;
  localStream?.getAudioTracks().forEach(t=>t.enabled=micOn);
  updateMicBtn();
}
function updateMicBtn(){
  const btn=document.getElementById('btn-mic');
  const ico=document.getElementById('ico-mic');
  btn.className='ctrl-btn'+(micOn?'':' off');
  ico.setAttribute('data-lucide', micOn?'mic':'mic-off');
  lucide.createIcons();
}

function toggleCam(){
  camOn=!camOn;
  localStream?.getVideoTracks().forEach(t=>t.enabled=camOn);
  updateCamBtn();
}
function updateCamBtn(){
  const btn=document.getElementById('btn-cam');
  const ico=document.getElementById('ico-cam');
  btn.className='ctrl-btn'+(camOn?'':' off');
  ico.setAttribute('data-lucide', camOn?'video':'video-off');
  lucide.createIcons();
}

/* ═══════════════════ CHAT ═══════════════════ */
function toggleChat(){
  chatOpen ? closeChatPanel() : openChatPanel();
}
function openChatPanel(){
  chatOpen=true;
  document.getElementById('chat-panel').classList.add('open');
  document.getElementById('btn-chat').classList.add('active-blue');
  unread=0; updateBadge();
  setTimeout(()=>scrollChat(),350);
}
function closeChatPanel(){
  chatOpen=false;
  document.getElementById('chat-panel').classList.remove('open');
  document.getElementById('btn-chat').classList.remove('active-blue');
}
function scrollChat(){
  const el=document.getElementById('chat-msgs');
  el.scrollTop=el.scrollHeight;
}
function updateBadge(){
  const b=document.getElementById('chat-badge');
  if(unread>0){ b.textContent=unread>9?'9+':unread; b.classList.add('show'); }
  else b.classList.remove('show');
}

function addMsg(text, who, time){
  const msgs = document.getElementById('chat-msgs');
  const empty = msgs.querySelector('.chat-empty');
  if(empty) empty.remove();

  const d = document.createElement('div');
  d.className = 'msg ' + who;
  d.innerHTML = `
    <div class="msg-who">${who==='me'?'나':'상대방'}</div>
    <div class="msg-bubble">${text.replace(/</g,'&lt;')}</div>
    <div class="msg-time">${time}</div>
  `;
  msgs.appendChild(d);
  scrollChat();

  if(who==='them' && !chatOpen){
    unread++; updateBadge();
    toast(`💬 ${text.length>30?text.slice(0,30)+'…':text}`,'');
  }
}

function sendChat(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();
  if(!text) return;
  const time=fmtTime();
  const sent=sendDC({type:'chat',text,time});
  if(!sent){ toast('상대방과 연결되지 않았습니다.','error'); return; }
  addMsg(text,'me',time);
  inp.value='';
}

/* ═══════════════════ REACTIONS ═══════════════════ */
function toggleReactPicker(){
  reactPickerOpen=!reactPickerOpen;
  document.getElementById('react-picker').classList.toggle('open',reactPickerOpen);
  document.getElementById('btn-react').classList.toggle('active-blue',reactPickerOpen);
}
function sendReaction(emoji){
  reactPickerOpen=false;
  document.getElementById('react-picker').classList.remove('open');
  document.getElementById('btn-react').classList.remove('active-blue');
  sendDC({type:'reaction',emoji});
  showReaction(emoji, true);
}
function showReaction(emoji, isMine){
  const overlay=document.getElementById('reaction-overlay');
  // 큰 중앙 라벨
  const lbl=document.createElement('div');
  lbl.className='reaction-label';
  lbl.textContent=emoji;
  overlay.appendChild(lbl);
  setTimeout(()=>lbl.remove(),1900);

  // 여러 개 버블 (자기 화면에만)
  if(isMine){
    for(let i=0;i<3;i++){
      setTimeout(()=>{
        const b=document.createElement('div');
        b.className='reaction-bubble';
        b.textContent=emoji;
        b.style.left=Math.random()*80+10+'%';
        overlay.appendChild(b);
        setTimeout(()=>b.remove(),2900);
      },i*180);
    }
  }
}

/* ═══════════════════ COPY ═══════════════════ */
function copyId(){
  navigator.clipboard.writeText(roomId).then(()=>toast('방 코드 복사됨!','success'));
}

/* ═══════════════════ SHOW CALL ═══════════════════ */
function showCall(){
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('call-screen').style.display='block';
}

/* ═══════════════════ DRAGGABLE PIP ═══════════════════ */
(function(){
  const pip=document.getElementById('pip');
  let drag=false,ox=0,oy=0;
  pip.addEventListener('mousedown',e=>{
    drag=true; ox=e.clientX-pip.offsetLeft; oy=e.clientY-pip.offsetTop;
    pip.style.cursor='grabbing'; e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    pip.style.right='auto'; pip.style.bottom='auto';
    pip.style.left=(e.clientX-ox)+'px'; pip.style.top=(e.clientY-oy)+'px';
  });
  document.addEventListener('mouseup',()=>{ drag=false; pip.style.cursor='grab'; });
})();

/* ═══════════════════ EVENT LISTENERS ═══════════════════ */
document.addEventListener('DOMContentLoaded',()=>{
  renderIcons();

  document.getElementById('tab-btn-create').addEventListener('click',()=>switchTab('create'));
  document.getElementById('tab-btn-join').addEventListener('click',()=>switchTab('join'));
  document.getElementById('btn-create').addEventListener('click',createRoom);
  document.getElementById('btn-join').addEventListener('click',joinRoom);
  document.getElementById('btn-copy-setup').addEventListener('click',copyId);
  document.getElementById('btn-copy-banner').addEventListener('click',copyId);
  document.getElementById('btn-mic').addEventListener('click',toggleMic);
  document.getElementById('btn-cam').addEventListener('click',toggleCam);
  document.getElementById('btn-react').addEventListener('click',toggleReactPicker);
  document.getElementById('btn-chat').addEventListener('click',toggleChat);
  document.getElementById('btn-chat-close').addEventListener('click',closeChatPanel);
  document.getElementById('btn-end').addEventListener('click',endCall);
  document.getElementById('btn-send').addEventListener('click',sendChat);

  document.getElementById('chat-input').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendChat(); }
  });
  document.getElementById('join-input').addEventListener('input',function(){
    this.value=this.value.toUpperCase();
  });

  document.querySelectorAll('.r-btn').forEach(btn=>{
    btn.addEventListener('click',()=>sendReaction(btn.dataset.r));
  });

  // 피커 외부 클릭 닫기
  document.addEventListener('click',e=>{
    if(reactPickerOpen && !e.target.closest('#react-picker') && !e.target.closest('#btn-react')){
      reactPickerOpen=false;
      document.getElementById('react-picker').classList.remove('open');
      document.getElementById('btn-react').classList.remove('active-blue');
    }
  });
});

function switchTab(tab){
  document.getElementById('tab-btn-create').classList.toggle('active', tab==='create');
  document.getElementById('tab-btn-join').classList.toggle('active', tab==='join');
  document.getElementById('tab-create').classList.toggle('active', tab==='create');
  document.getElementById('tab-join').classList.toggle('active', tab==='join');
}
</script>
